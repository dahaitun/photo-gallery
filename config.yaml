# 📸 相册配置文件
# 修改 photo_root 为你的照片根目录（SMB 挂载路径）

photo_root: "/Users/luojiutian/Downloads/相册"   # 当前展示路径

# 服务配置
host: "0.0.0.0"       # 0.0.0.0 表示局域网所有设备都可访问
port: 8080

# 缩略图配置
thumbnail_size: 320   # 缩略图宽度（像素）
cache_dir: ".cache"   # 缩略图缓存目录（相对于本文件所在目录）

# 支持的图片格式
supported_formats:
  - jpg
  - jpeg
  - png
  - gif
  - webp
  - heic
  - bmp
  - tiff
  - tif
