services:
  photo-gallery:
    build: .
    container_name: photo-gallery
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 数据持久化（数据库、缓存、配置文件）
      - ./data:/app/data
      # 相册库挂载 — 改成你 NAS 上实际的相册路径
      # 格式：宿主机路径:容器内路径:ro（只读）
      # 添加新相册库：复制一行，改宿主机路径和容器内路径即可
      - /Users/luojiutian/Downloads/相册:/photos:ro
      # 如果有其他相册库，取消下面的注释并修改路径
      # - /path/to/你的归档:/archive:ro
      # - /path/to/你的测试:/test:ro
    environment:
      - TZ=Asia/Shanghai
